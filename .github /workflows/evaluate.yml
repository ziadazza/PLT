name: Evaluate Submission

on:
  pull_request_target:
    types: [opened, synchronize]
    paths:
      - "submission/*.enc"
      - "submission/*.enc.key"

permissions:
  contents: write
  pull-requests: write

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout PR (submission only)
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          path: pr_repo

      # 2. Checkout main repo (leaderboard + code)
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          ref: main
          path: main_repo

      # 3. Checkout private labels repo (FIXED: use PAT)
      - name: Checkout private labels
        uses: actions/checkout@v4
        with:
          repository: tasneem-mselim/hlm-vision-private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private_data
          sparse-checkout: |
            emoCK.csv

      # 4. Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pandas scikit-learn numpy cryptography

      # 5. Validate submission exists
      - name: Validate submission
        run: |
          if ! ls pr_repo/submission/*.enc 1> /dev/null 2>&1; then
            echo "❌ No .enc file found"
            exit 1
          fi

          if ! ls pr_repo/submission/*.enc.key 1> /dev/null 2>&1; then
            echo "❌ No .enc.key file found"
            exit 1
          fi

      # 6. Copy submission files
      - name: Copy submission
        run: |
          cp pr_repo/submission/*.enc main_repo/
          cp pr_repo/submission/*.enc.key main_repo/

      # 7. Create private key file
      - name: Create private key
        run: |
          echo "${{ secrets.PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      # 8. Decrypt submission
      - name: Decrypt submission
        run: |
          cd main_repo

          ENC_FILE=$(ls *.enc | head -n 1)
          KEY_FILE="$ENC_FILE.key"

          echo "Decrypting $ENC_FILE"

          python encryption/decrypt_submission.py "$ENC_FILE" "$KEY_FILE" decrypted.csv ../private_key.pem

          if [ ! -f decrypted.csv ]; then
            echo "❌ Decryption failed"
            exit 1
          fi

      # 9. Evaluate submission (FIXED filename)
      - name: Evaluate submission
        env:
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          cd main_repo
          python evaluate.py decrypted.csv ../private_data/emoCK.csv

      # 10. Generate leaderboard HTML
      - name: Generate leaderboard
        run: |
          cd main_repo
          python generate_leaderboard_html.py

      # 11. Commit leaderboard safely
      - name: Push leaderboard
        run: |
          cd main_repo

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add final_leaderboard.csv final_leaderboard.html

          if ! git diff --cached --quiet; then
            git commit -m "Update leaderboard PR #${{ github.event.pull_request.number }}"
            git pull --rebase origin main || exit 1
            git push origin HEAD:main
          else
            echo "No leaderboard changes"
          fi

      # 12. Cleanup
      - name: Cleanup
        run: rm -f private_key.pem
